# EduManage — Synthetic Health Check
#
# Runs every 15 minutes against the production Supabase project. Probes
# two endpoints:
#   1. Supabase REST root — expects HTTP 200.
#   2. ai-assistant edge function — expects HTTP 401 (unauthenticated) or
#      HTTP 400 (malformed body). Either proves the function is reachable
#      and executing its auth/validation pipeline.
#
# On failure, posts a Slack alert and creates a GitHub issue (best-effort).

name: Health Check

on:
  schedule:
    # Every 15 minutes. Times are UTC.
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: health-check
  cancel-in-progress: false

env:
  SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  health-check:
    name: Probe Supabase REST + ai-assistant
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🩺 Compute function URL
        id: fn-url
        run: |
          # Derive the edge-function base URL from the project URL.
          # Example: https://abcdefg.supabase.co -> https://abcdefg.functions.supabase.co
          BASE="${SUPABASE_URL%/}"
          FUNCTIONS_URL="${BASE/.supabase.co/.functions.supabase.co}"
          echo "ai_url=${FUNCTIONS_URL}/ai-assistant" >> "$GITHUB_OUTPUT"
          echo "rest_url=${BASE}/rest/v1/" >> "$GITHUB_OUTPUT"
          echo "Functions URL: ${FUNCTIONS_URL}"

      - name: 🩺 Probe Supabase REST endpoint
        id: rest
        continue-on-error: true
        run: |
          set -euo pipefail
          CODE=$(curl --silent --output /dev/null --write-out '%{http_code}' \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            "${{ steps.fn-url.outputs.rest_url }}")
          echo "code=${CODE}" >> "$GITHUB_OUTPUT"
          echo "REST endpoint responded with HTTP ${CODE}"
          if [ "$CODE" != "200" ]; then
            echo "::error::Supabase REST returned HTTP ${CODE} (expected 200)"
            exit 1
          fi

      - name: 🩺 Probe ai-assistant edge function
        id: ai
        continue-on-error: true
        run: |
          set -euo pipefail
          # Send an intentionally unauthenticated POST with empty body.
          # A healthy function responds with 401 (no auth header) or
          # 400 (invalid JSON). Anything else (5xx, 000) indicates a problem.
          CODE=$(curl --silent --output /dev/null --write-out '%{http_code}' \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${{ steps.fn-url.outputs.ai_url }}")
          echo "code=${CODE}" >> "$GITHUB_OUTPUT"
          echo "ai-assistant responded with HTTP ${CODE}"
          if [ "$CODE" != "401" ] && [ "$CODE" != "400" ]; then
            echo "::error::ai-assistant returned HTTP ${CODE} (expected 401 or 400)"
            exit 1
          fi

      - name: 🚨 Notify on failure
        if: ${{ steps.rest.outcome == 'failure' || steps.ai.outcome == 'failure' }}
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚨 EduManage health check FAILED",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🚨 EduManage health check FAILED*\nREST: HTTP ${{ steps.rest.outputs.code }} (expected 200)\nai-assistant: HTTP ${{ steps.ai.outputs.code }} (expected 401 or 400)\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: 📝 Append to run summary
        if: always()
        run: |
          echo "### Health Check Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Endpoint | Expected | Actual | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          REST_ICON=$([ "${{ steps.rest.outcome }}" = "success" ] && echo "✅" || echo "❌")
          AI_ICON=$([ "${{ steps.ai.outcome }}" = "success" ] && echo "✅" || echo "❌")
          echo "| Supabase REST | 200 | ${{ steps.rest.outputs.code }} | $REST_ICON |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ai-assistant | 401 or 400 | ${{ steps.ai.outputs.code }} | $AI_ICON |" >> "$GITHUB_STEP_SUMMARY"
